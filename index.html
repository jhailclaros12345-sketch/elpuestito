<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Puestito</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    header{
      background:linear-gradient(90deg,#0d6efd,#28a745);
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      margin:0;
      font-size:32px;
    }

    .sub{
      margin-top:5px;
      font-size:18px;
    }

    .ofertas{
      background:#ff9800;
      color:white;
      margin:20px;
      padding:15px;
      border-radius:15px;
      text-align:center;
    }

    .productos{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:white;
      border-radius:15px;
      padding:15px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,.15);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .precio{
      color:green;
      font-size:22px;
      font-weight:bold;
    }

    .boton{
      display:inline-block;
      margin-top:10px;
      background:#25D366;
      color:white;
      text-decoration:none;
      padding:10px 15px;
      border-radius:10px;
      font-weight:bold;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#0d6efd;
      color:white;
      margin-top:20px;
    }
  </style>
</head>
<body>

<header>
<h1>🛒 El Puestito</h1>
<p class="sub">Todo para tu hogar al mejor precio</p>
</header>

<div class="ofertas">
<h2>🔥 Ofertas de la semana</h2>
<p>🧻 Higenol Plus</p>
<p>🍋 Magistral Ultra</p>
<p>🪥 Colgate Triple Acción</p>
</div>

<section class="productos">

<div class="card">
<h3>Colgate Triple Acción</h3>
<p class="precio">$3000</p>
<a class="boton" href="https://wa.me/541126162963">Comprar</a>
</div>

<div class="card">
<h3>Magistral Ultra</h3>
<p class="precio">$2400</p>
<a class="boton" href="https://wa.me/541126162963">Comprar</a>
</div>

<div class="card">
<h3>Higenol Plus</h3>
<p class="precio">$1700</p>
<a class="boton" href="https://wa.me/541126162963">Comprar</a>
</div>

</section>

<footer>
📱 WhatsApp: 11 2616-2963
</footer>

</body>
</html>
