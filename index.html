<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Puestito</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🏪 El Puestito</h1>
    <p>Mayorista y Minorista</p>
</header>

<section class="buscador">
    <input
        type="text"
        id="buscador"
        placeholder="🔍 Buscar productos...">
</section>

<section class="categorias">
    <div class="categoria">Todos</div>
    <div class="categoria">Limpieza</div>
    <div class="categoria">Higiene</div>
    <div class="categoria">Papeles</div>
    <div class="categoria">Almacén</div>
    <div class="categoria">Bebidas</div>
</section>

<section>
    <h2>Nuestros productos</h2>

    <div id="contenedor-productos" class="productos">
        <!-- Los productos aparecerán automáticamente -->
    </div>
</section>

<footer>
    <p>© 2026 El Puestito - Todos los derechos reservados</p>
</footer>

<script src="script.js"></script>

</body>
</html>
