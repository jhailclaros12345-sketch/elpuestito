<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Puestito</title>

<div class="carrito-icono" onclick="verCarrito()">
    🛒 <span id="contador-carrito">0</span>
</div>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="panel-carrito" class="panel-carrito">
    <div class="panel-header">
        <h2>🛒 Mi carrito</h2>
        <button onclick="cerrarCarrito()">✖</button>
    </div>

    <div id="contenido-carrito">
    <p>Tu carrito está vacío.</p>
</div>

<div id="footer-carrito"></div>
</div>

<header>
    <h1>🏪 El Puestito</h1>
    <p>Mayorista y Minorista</p>
</header>

<section class="buscador">
    <input
        type="text"
        id="buscador"
        placeholder="🔍 Buscar productos...">

<div class="categorias">
  <button onclick="filtrarCategoria('todos')">Todos</button>
  <button onclick="filtrarCategoria('limpieza')">🧴 Limpieza</button>
  <button onclick="filtrarCategoria('higiene')">🪥 Higiene</button>
  <button onclick="filtrarCategoria('papeles')">🧻 Papeles</button>
  <button onclick="filtrarCategoria('almacen')">🍪 Almacén</button>
  <button onclick="filtrarCategoria('bebidas')">🥤 Bebidas</button>
</div>
</section>
<section class="hero">
    <h1>🛒 El Puestito</h1>
    <p>Todo para tu hogar al mejor precio</p>

    <div class="hero-info">
        🧻 Papeles • 🧴 Limpieza • 🪥 Higiene • 🍝 Almacén
    </div>

    <a href="#productos" class="hero-btn">Ver productos</a>
</section>

<sectionid="productos">
    <h2>Nuestros productos</h2>
    <div id="contenedor-productos" class="productos">
        <!-- Los productos aparecerán automáticamente -->
    </div>
</section>

      
<footer>
    <p>© 2026 El Puestito - Todos los derechos reservados</p>
</footer>

<script src="script.js"></script>

</body>
</html>
