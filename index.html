<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Tienda Skater & Punk</title>
    <!-- Iconos de FontAwesome para que queden lindos los botones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Encabezado / Logo y Buscador -->
    <header>
        <div class="header-container">
            <div class="logo">
                <!-- Podés cambiar "images/logo.png" por tu logo real más adelante -->
                <img src="images/logo.png" alt="Logo de la Tienda" onerror="this.src='https://via.placeholder.com/150x50?text=TU+LOGO'">
            </div>
            
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar buzos, remeras, accesorios...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <!-- Carrusel de Ofertas / Banner Principal -->
    <section class="banner-carousel">
        <div class="carousel-item">
            <h2>🔥 10% OFF EN TU PRIMERA COMPRA 🔥</h2>
            <p>Llevate lo mejor de la onda urbana, Oversize y Punk</p>
        </div>
    </section>

    <!-- Filtros por Categorías -->
    <section class="categories-section">
        <h3>Categorías</h3>
        <div class="categories-container">
            <button class="category-btn active" data-category="todos">Todo</button>
            <button class="category-btn" data-category="remeras">Remeras Oversize</button>
            <button class="category-btn" data-category="buzos">Buzos / Hoodies</button>
            <button class="category-btn" data-category="accesorios">Accesorios & Punk</button>
        </div>
    </section>

    <!-- Sección de Productos Destacados -->
    <main class="products-section">
        <h3>Productos Destacados</h3>
        <div class="products-grid" id="products-grid">
            
            <!-- Producto 1: Remera Oversize -->
            <div class="product-card" data-category="remeras">
                <img src="images/remera-oversize.jpg" alt="Remera Skate Oversize" onerror="this.src='https://via.placeholder.com/250?text=Remera+Oversize'">
                <div class="product-info">
                    <h4>Remera Oversize Skate Negra</h4>
                    <p class="price">$18.500</p>
                    <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i> Agregar al pedido</button>
                </div>
            </div>

            <!-- Producto 2: Buzo Stray Kids -->
            <div class="product-card" data-category="buzos">
                <img src="images/buzo-skz.jpg" alt="Buzo Hoodie Stray Kids" onerror="this.src='https://via.placeholder.com/250?text=Buzo+Stray+Kids'">
                <div class="product-info">
                    <h4>Buzo Hoodie - Stray Kids Rock</h4>
                    <p class="price">$28.000</p>
                    <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i> Agregar al pedido</button>
                </div>
            </div>

            <!-- Producto 3: Choker/Accesorio Punk Nana -->
            <div class="product-card" data-category="accesorios">
                <img src="images/choker-nana.jpg" alt="Choker Punk Estilo Nana" onerror="this.src='https://via.placeholder.com/250?text=Choker+Punk+Nana'">
                <div class="product-info">
                    <h4>Choker de Cuero con Tachas (Estilo Nana)</h4>
                    <p class="price">$7.500</p>
                    <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i> Agregar al pedido</button>
                </div>
            </div>

        </div>
    </main>

    <!-- Botón Flotante de WhatsApp -->
    <a href="https://wa.me/54911XXXXXXXX" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Vinculamos el archivo JS para que después funcione todo -->
    <script src="script.js"></script>
</body>
</html>
